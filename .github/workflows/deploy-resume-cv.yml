name: Deploy resumeCV to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'react/resumeCV/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react/resumeCV/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: react/resumeCV

      - name: Build
        run: npm run build
        working-directory: react/resumeCV

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: react/resumeCV/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
